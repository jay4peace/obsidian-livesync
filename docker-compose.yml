services:
  obsidian-livesync:
    container_name: obsidian-livesync #shortened name
    image: couchdb:3
    env_file:
      - .env
    volumes:
      - ./couchdb_data:/opt/couchdb/data
      - ./couchdb_config:/opt/couchdb/etc/local.d
    ports:
      - "5984:5984"
    restart: unless-stopped
    healthcheck:
      test: curl --fail -s http://localhost:5984/_up || exit 1
      start_period: 15s
      interval: 30s
      timeout: 10s
      retries: 3
      